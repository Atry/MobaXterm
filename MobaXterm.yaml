proxies:
  - name: MobaXterm
    type: socks5
    server: 127.0.0.1
    port: 8082


rules:
  # 你的显式直连
  # - GEOIP,PRIVATE,DIRECT,no-resolve

  # 指定需走代理的域名
  - DOMAIN-SUFFIX,ip.cn,MobaXterm

  # m3u8 files
  - DOMAIN-SUFFIX,v.kcdnvip.com,MobaXterm
  - DOMAIN-SUFFIX,conf.qvb.qcloud.com,MobaXterm

  # 常见视频/音乐 CDN 直连
  - GEOSITE,bilibili-cdn,DIRECT
  - DOMAIN-SUFFIX,71edge.com,DIRECT
  - DOMAIN-SUFFIX,iqiyipic.com,DIRECT
  - DOMAIN-SUFFIX,music.126.net,DIRECT
  - DOMAIN-SUFFIX,webrtcpunch.video.qq.com,DIRECT
  - DOMAIN-SUFFIX,kcdnvip.com,DIRECT
  - DOMAIN-SUFFIX,qvb.qcloud.com,DIRECT
  - DOMAIN-SUFFIX,cctvpic.com,DIRECT
  - DOMAIN-SUFFIX,myqcloud.com,DIRECT
  - DOMAIN-SUFFIX,cbs-img.sports.cctv.com,DIRECT

  # 仅对特定“版权类中国站”走代理（不启用全局 CN 规则）
  - GEOSITE,zhihu,MobaXterm
  - GEOSITE,netease,MobaXterm
  - GEOSITE,iqiyi,MobaXterm
  - GEOSITE,tencent,MobaXterm
  - GEOSITE,bilibili,MobaXterm
  - GEOSITE,cctv,MobaXterm

  # 兜底
  # - MATCH,MobaXterm
  # - MATCH,DIRECT
  #  
  #  # UDP 全直连
  #  - NETWORK,UDP,DIRECT
